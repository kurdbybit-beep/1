<!DOCTYPE html>
<html lang="ku" dir="rtl" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Solutions | Digital Catalog</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&display=swap');
        :root { --primary: #0ea5e9; --accent: #10b981; --card-bg: rgba(15, 23, 42, 0.7); --glass-border: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Noto Sans Arabic', sans-serif; margin: 0; padding-bottom: 50px; min-height: 100vh; color: #fff;
            background: linear-gradient(rgba(2, 6, 23, 0.9), rgba(2, 6, 23, 0.9)), url('https://images.unsplash.com/photo-1473341304170-971dccb5ac1e?q=80&w=2070&auto=format&fit=crop');
            background-size: cover; background-position: center; background-attachment: fixed;
        }
        .top-nav { display: flex; gap: 10px; padding: 15px 20px; position: fixed; width: 100%; top: 0; z-index: 1000; }
        [dir="rtl"] .top-nav { justify-content: flex-end; }
        .nav-btn { position: relative; cursor: pointer; background: rgba(14, 165, 233, 0.2); padding: 10px; border-radius: 12px; backdrop-filter: blur(10px); border: 1px solid var(--glass-border); display: flex; align-items: center; }
        #cart-count { position: absolute; top: -5px; right: -5px; background: var(--accent); color: #fff; font-size: 0.75rem; font-weight: 900; padding: 2px 7px; border-radius: 50%; }
        header { padding: 100px 20px 30px; text-align: center; }
        header h1 { font-size: 2.2rem; color: var(--primary); font-weight: 900; margin: 0; }
        .categories-container { position: sticky; top: 0; z-index: 100; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(15px); padding: 15px 10px; overflow-x: auto; display: flex; gap: 12px; border-bottom: 1px solid var(--glass-border); }
        .cat-btn { padding: 10px 25px; background: rgba(255,255,255,0.05); border-radius: 50px; cursor: pointer; border: 1px solid var(--glass-border); white-space: nowrap; color: #ccc; }
        .cat-btn.active { background: var(--primary); color: #fff; font-weight: 700; border-color: var(--primary); }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 15px; }
        .product-card { background: var(--card-bg); border-radius: 20px; overflow: hidden; border: 1px solid var(--glass-border); backdrop-filter: blur(5px); display: flex; flex-direction: column; position: relative; }
        .product-img { width: 100%; height: 150px; background-size: cover; background-position: center; background-color: #333; }
        .product-info { padding: 15px; text-align: center; }
        .product-info h3 { font-size: 1rem; margin: 0 0 10px 0; min-height: 45px; }
        .price-tag { background: var(--accent); color: #fff; padding: 5px 12px; border-radius: 12px; font-weight: 900; }
        .add-btn { position: absolute; top: 10px; left: 10px; background: var(--primary); color: #fff; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; z-index: 10; }
        #cart-panel { position: fixed; top: 0; width: 320px; max-width: 85%; height: 100%; background: #0f172a; z-index: 2000; transition: 0.4s; padding: 25px; display: flex; flex-direction: column; }
        [dir="rtl"] #cart-panel { right: -350px; }
        [dir="rtl"] #cart-panel.open { right: 0; }
        #cart-list { flex-grow: 1; overflow-y: auto; margin: 20px 0; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); padding: 12px; border-radius: 15px; margin-bottom: 12px; }
        .clear-btn { width: 100%; padding: 15px; background: #ef4444; color: #fff; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; }
        .menu-section { display: none; }
        .menu-section.active { display: block; }
        #loader { text-align: center; padding: 50px; }
    </style>
</head>
<body>

<div class="top-nav">
    <div class="nav-btn" onclick="toggleCart()">
        <i class="fas fa-bolt fa-lg" style="color: var(--primary);"></i>
        <span id="cart-count">0</span>
    </div>
    <div class="nav-btn" onclick="toggleLang()">
        <i class="fas fa-globe fa-lg" style="color: var(--accent);"></i>
    </div>
</div>

<header>
    <h1 id="brand-name">ENERGY SOLUTIONS</h1>
    <p id="brand-tagline">برهەمێن وزێ یێن سەردەم</p>
</header>

<div id="lang-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:3000; align-items:center; justify-content:center;" onclick="toggleLang()">
    <div class="lang-card" style="background:#1e293b; padding:30px; border-radius:25px; text-align:center; border:1px solid var(--primary); width:280px;" onclick="event.stopPropagation()">
        <h3 id="lang-title">زمان هەلبژێرە</h3>
        <div class="lang-opt" style="padding:15px; margin:10px 0; background:rgba(255,255,255,0.05); border-radius:15px; cursor:pointer;" onclick="setLang('ku')">کوردی (Badini)</div>
        <div class="lang-opt" style="padding:15px; margin:10px 0; background:rgba(255,255,255,0.05); border-radius:15px; cursor:pointer;" onclick="setLang('en')">English</div>
    </div>
</div>

<div id="cart-panel">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2 id="cart-title">داخوازیا من</h2>
        <i class="fas fa-times fa-lg" onclick="toggleCart()" style="cursor:pointer"></i>
    </div>
    <div id="cart-list"></div>
    <div style="border-top: 1px solid #333; padding-top: 20px;">
        <h3 style="text-align:center;">Total: <span id="total-price" style="color:var(--accent)">0</span></h3>
        <button class="clear-btn" onclick="clearCart()" id="btn-clear">پاککرنا سەلکێ</button>
    </div>
</div>

<div class="categories-container" id="catBar"></div>
<div id="loader"><i class="fas fa-spinner fa-spin fa-2x"></i><br>Loading Products...</div>
<div id="menuContent"></div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTp62O3unm8bNGD9jMfNnz6UvUOiSJXnaS05lbDV7q8xj7g0FQtQG9Ko1YTRap2JAz7jtWjRhJG6npY/pub?output=csv';
    let dataList = [], cart = [], currentLang = 'ku';

    async function loadData() {
        try {
            const res = await fetch(csvUrl);
            const txt = await res.text();
            const lines = txt.split(/\r?\n/);
            
            dataList = lines.slice(1).map(line => {
                const parts = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(s => s.replace(/"/g, '').trim());
                if (parts.length < 4 || !parts[3]) return null; // ئەگەر کەتیگۆری نەبیت، پشتگوهـ دهاڤێژیت
                return {
                    name_en: parts[0],
                    price: parts[1],
                    img: parts[2],
                    cat: parts[3],
                    name_ku: parts[4] || parts[0],
                    name_ar: parts[5] || parts[0]
                };
            }).filter(x => x !== null);

            document.getElementById('loader').style.display = 'none';
            if(dataList.length === 0) {
                document.getElementById('loader').innerHTML = "No products found. Check your CSV columns.";
                document.getElementById('loader').style.display = 'block';
            }
            renderMenu();
        } catch (e) {
            document.getElementById('loader').innerHTML = "Connection Error!";
        }
    }

    function renderMenu() {
        const catBar = document.getElementById('catBar');
        const menuContent = document.getElementById('menuContent');
        catBar.innerHTML = ''; menuContent.innerHTML = '';

        const cats = [...new Set(dataList.map(i => i.cat))];
        cats.forEach((cat, index) => {
            const btn = document.createElement('div');
            btn.className = `cat-btn ${index === 0 ? 'active' : ''}`;
            btn.innerText = cat;
            btn.onclick = () => switchCat(cat, btn);
            catBar.appendChild(btn);

            const section = document.createElement('div');
            section.id = `section-${cat.replace(/\s+/g, '-')}`;
            section.className = `menu-section ${index === 0 ? 'active' : ''}`;
            
            const grid = document.createElement('div');
            grid.className = 'product-grid';

            dataList.filter(f => f.cat === cat).forEach(item => {
                const name = currentLang === 'ku' ? item.name_ku : item.name_en;
                grid.innerHTML += `
                    <div class="product-card">
                        <button class="add-btn" onclick="addToCart('${item.name_en.replace(/'/g, "\\'")}')"><i class="fas fa-plus"></i></button>
                        <div class="product-img" style="background-image: url('${item.img}')"></div>
                        <div class="product-info">
                            <h3>${name}</h3>
                            <span class="price-tag">${item.price}</span>
                        </div>
                    </div>`;
            });
            section.appendChild(grid);
            menuContent.appendChild(section);
        });
    }

    function switchCat(cat, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.menu-section').forEach(s => s.classList.remove('active'));
        document.getElementById(`section-${cat.replace(/\s+/g, '-')}`).classList.add('active');
    }

    function addToCart(nameEn) {
        const item = dataList.find(i => i.name_en === nameEn);
        const existing = cart.find(i => i.name_en === nameEn);
        if (existing) existing.qty++; else cart.push({ ...item, qty: 1 });
        updateCartUI();
    }

    function updateCartUI() {
        const list = document.getElementById('cart-list');
        const count = document.getElementById('cart-count');
        const totalEl = document.getElementById('total-price');
        let total = 0;
        
        count.innerText = cart.reduce((a, b) => a + b.qty, 0);
        list.innerHTML = '';

        cart.forEach((item, index) => {
            const priceNum = parseInt(item.price.replace(/[^0-9]/g, '')) || 0;
            total += (priceNum * item.qty);
            list.innerHTML += `<div class="cart-item">
                <span>${item.qty}x ${currentLang === 'ku' ? item.name_ku : item.name_en}</span>
                <i class="fas fa-trash" onclick="cart.splice(${index},1);updateCartUI()" style="color:red;cursor:pointer"></i>
            </div>`;
        });
        totalEl.innerText = total.toLocaleString() + " IQD";
    }

    function clearCart() { cart = []; updateCartUI(); }
    function toggleCart() { document.getElementById('cart-panel').classList.toggle('open'); }
    function toggleLang() { 
        const m = document.getElementById('lang-modal');
        m.style.display = m.style.display === 'none' ? 'flex' : 'none'; 
    }
    function setLang(l) { currentLang = l; renderMenu(); updateCartUI(); toggleLang(); }

    loadData();
</script>
</body>
</html>
