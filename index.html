<!DOCTYPE html>
<html lang="en" dir="ltr" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Rest | Modern Menu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&display=swap');

        :root {
            --primary: #38bdf8;
            --accent: #fbbf24;
            --card-bg: rgba(255, 255, 255, 0.03); 
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Noto Sans Arabic', sans-serif;
            margin: 0;
            padding-bottom: 50px;
            min-height: 100vh;
            color: #fff;
            background: linear-gradient(rgba(2, 6, 23, 0.8), rgba(2, 6, 23, 0.8)), 
                        url('https://i.postimg.cc/qRzMnWFV/photo-2026-05-09-18-07-24.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }

        .top-nav {
            display: flex;
            gap: 10px;
            padding: 15px 20px;
            position: absolute;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        [dir="ltr"] .top-nav { justify-content: flex-start; }
        [dir="rtl"] .top-nav { justify-content: flex-end; }

        .nav-btn {
            position: relative;
            cursor: pointer;
            background: rgba(56, 189, 248, 0.2);
            padding: 10px;
            border-radius: 12px;
            backdrop-filter: blur(5px);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--accent);
            color: #000;
            font-size: 0.7rem;
            font-weight: 900;
            padding: 2px 6px;
            border-radius: 50%;
        }

        header { padding: 80px 20px 20px; text-align: center; }
        header h1 { font-size: 2.5rem; color: var(--primary); font-weight: 900; margin: 0; }

        .food-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; }
        .food-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .add-btn {
            position: absolute;
            top: 10px;
            background: var(--primary);
            color: #fff;
            border: none;
            width: 32px; height: 32px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 5;
        }
        [dir="ltr"] .add-btn { right: 10px; }
        [dir="rtl"] .add-btn { left: 10px; }

        .food-img { width: 100%; height: 130px; background-size: cover; background-position: center; }
        .food-info { padding: 12px; text-align: center; }
        .price-tag { background: var(--accent); color: #000; padding: 4px 10px; border-radius: 12px; font-weight: 900; }

        #cart-panel {
            position: fixed;
            top: 0;
            width: 85%;
            height: 100%;
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(20px);
            z-index: 2000;
            transition: 0.4s ease;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        [dir="ltr"] #cart-panel { left: -100%; }
        [dir="rtl"] #cart-panel { right: -100%; }
        [dir="ltr"] #cart-panel.open { left: 0; }
        [dir="rtl"] #cart-panel.open { right: 0; }

        #cart-list { flex-grow: 1; overflow-y: auto; margin-top: 15px; padding-bottom: 20px; }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .checkout-btn {
            width: 100%; padding: 15px; background: var(--accent); color: #000;
            border: none; border-radius: 10px; font-weight: 900; margin-top: 10px; cursor: pointer;
        }

        .input-field {
            width: 100%; padding: 10px; margin-top: 8px; border-radius: 8px;
            border: 1px solid #444; background: #0f172a; color: white;
        }

        .categories-container { 
            position: sticky; top: 0; z-index: 100; 
            background: rgba(15, 23, 42, 0.9); 
            backdrop-filter: blur(15px); padding: 12px 10px; 
            overflow-x: auto; display: flex; gap: 10px;
        }

        .cat-btn { padding: 10px 20px; background: rgba(255,255,255,0.05); border-radius: 50px; cursor: pointer; border: 1px solid var(--glass-border); white-space: nowrap; }
        .cat-btn.active { background: var(--primary); color: #020617; }
        
        .menu-section { display: none; }
        .menu-section.active { display: block; }

        #lang-modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            z-index: 3000; align-items: center; justify-content: center;
        }
        .lang-card { background: #1e293b; padding: 25px; border-radius: 20px; text-align: center; border: 1px solid var(--primary); }
    </style>
</head>
<body>

<div class="top-nav">
    <div class="nav-btn" onclick="toggleCart()">
        <i class="fas fa-shopping-basket fa-lg" style="color: var(--primary);"></i>
        <span id="cart-count">0</span>
    </div>
    <div class="nav-btn" onclick="toggleLang()">
        <i class="fas fa-language fa-lg" style="color: var(--accent);"></i>
    </div>
</div>

<header><h1>TECH REST</h1></header>

<div id="lang-modal" onclick="toggleLang()">
    <div class="lang-card" onclick="event.stopPropagation()">
        <h3 id="lang-title">Select Language</h3>
        <div style="cursor:pointer; padding:10px;" onclick="setLang('en')">English</div>
        <div style="cursor:pointer; padding:10px;" onclick="setLang('ku')">کوردی</div>
        <div style="cursor:pointer; padding:10px;" onclick="setLang('ar')">العربية</div>
    </div>
</div>

<div id="cart-panel">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2 id="cart-title">My Cart</h2>
        <i class="fas fa-times fa-lg" onclick="toggleCart()"></i>
    </div>
    
    <div id="cart-list"></div>

    <div id="checkout-form" style="display:none; border-top: 1px solid #444; padding-top:10px;">
        <div style="display:flex; gap:5px; margin-bottom:10px;">
            <button onclick="setService('outside')" id="btn-out" style="flex:1; padding:8px; border-radius:5px;">دەرڤە</button>
            <button onclick="setService('inside')" id="btn-in" style="flex:1; padding:8px; border-radius:5px;">ناڤدا</button>
        </div>
        <div id="fields-outside" style="display:none;">
            <input type="text" id="addr" class="input-field" placeholder="ناڤنیشان">
            <input type="number" id="phone" class="input-field" placeholder="مۆبایل">
        </div>
        <div id="fields-inside" style="display:none;">
            <input type="number" id="table" class="input-field" placeholder="ژمارا مێزێ">
        </div>
        <h3 style="text-align:center;">Total: <span id="total-price" style="color:var(--accent)">0</span></h3>
        <button class="checkout-btn" onclick="sendToFirebase()">ناردن بۆ کاشێری</button>
    </div>
</div>

<div class="categories-container" id="catBar"></div>
<div id="menuContent"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // --- لێرە کۆدێ Config یێ Firebase دانی ---
    const firebaseConfig = { apiKey: "YOUR_API", databaseURL: "YOUR_URL", projectId: "YOUR_ID" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTSRjwZs-DPmh8Cg7LwOa1HTa8m58e4LriIPHbkoxdNp-vcgkNHHsVnp89Dj_TE7xiDLMugKBJRtsBr/pub?output=csv';
    let dataList = [], cart = [], currentLang = 'ku', serviceType = '';

    const translations = {
        en: { cart: "My Cart", empty: "Empty", total: "Total", langTitle: "Select Language" },
        ku: { cart: "سەلکا من", empty: "سەلک ڤالایە", total: "کۆم", langTitle: "زمان هەلبژێرە" },
        ar: { cart: "سلتي", empty: "فارغة", total: "المجموع", langTitle: "اختر اللغة" }
    };

    async function loadData() {
        try {
            const res = await fetch(csvUrl);
            const txt = await res.text();
            const rows = txt.split('\n').slice(1);
            dataList = rows.map(r => {
                const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g, '').trim());
                if(c.length < 4) return null;
                return { 
                    name_en: c[0], 
                    price: c[1], 
                    img: c[2], 
                    cat: c[3], 
                    name_ku: c[4] || c[0], 
                    name_ar: c[5] || c[0] 
                };
            }).filter(i => i && i.cat);
            setLang('ku');
        } catch (e) { console.error("CSV Load Error:", e); }
    }

    function setLang(l) {
        currentLang = l;
        document.getElementById('mainHtml').dir = (l === 'en') ? 'ltr' : 'rtl';
        document.getElementById('cart-title').innerText = translations[l].cart;
        renderMenu(); updateCartUI(); toggleLang(false);
    }

    function renderMenu() {
        const catBar = document.getElementById('catBar');
        const menuContent = document.getElementById('menuContent');
        catBar.innerHTML = ''; menuContent.innerHTML = '';
        
        const cats = [...new Set(dataList.map(i => i.cat))];
        cats.forEach((cat, index) => {
            const btn = document.createElement('div');
            btn.className = `cat-btn ${index === 0 ? 'active' : ''}`;
            btn.innerText = cat;
            btn.onclick = () => switchCat(cat, btn);
            catBar.appendChild(btn);

            const section = document.createElement('div');
            section.id = `section-${cat}`;
            section.className = `menu-section ${index === 0 ? 'active' : ''}`;
            const grid = document.createElement('div');
            grid.className = 'food-grid';
            
            dataList.filter(f => f.cat === cat).forEach(food => {
                const card = document.createElement('div');
                card.className = 'food-card';
                // ڕاستکرنا ناڤێ ستوونێ ب لایەنێ زمانێ هەلبژارتی
                const displayName = currentLang === 'en' ? food.name_en : (currentLang === 'ku' ? food.name_ku : food.name_ar);
                
                card.innerHTML = `
                    <button class="add-btn" onclick="addToCart('${food.name_en.replace(/'/g, "\\'")}')"><i class="fas fa-plus"></i></button>
                    <div class="food-img" style="background-image: url('${food.img}')"></div>
                    <div class="food-info">
                        <h3>${displayName}</h3>
                        <span class="price-tag">${food.price}</span>
                    </div>`;
                grid.appendChild(card);
            });
            section.appendChild(grid);
            menuContent.appendChild(section);
        });
    }

    function switchCat(cat, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.menu-section').forEach(s => s.classList.remove('active'));
        document.getElementById(`section-${cat}`).classList.add('active');
    }

    function addToCart(nameEn) {
        const item = dataList.find(i => i.name_en === nameEn);
        const exist = cart.find(i => i.name_en === nameEn);
        if (exist) { exist.qty++; } else { cart.push({ ...item, qty: 1 }); }
        updateCartUI();
    }

    function removeFromCart(i) { cart.splice(i, 1); updateCartUI(); }

    function updateCartUI() {
        const list = document.getElementById('cart-list');
        const count = document.getElementById('cart-count');
        const priceEl = document.getElementById('total-price');
        const form = document.getElementById('checkout-form');

        count.innerText = cart.reduce((s, i) => s + i.qty, 0);
        list.innerHTML = cart.length === 0 ? `<p style="text-align:center">${translations[currentLang].empty}</p>` : '';
        form.style.display = cart.length > 0 ? 'block' : 'none';

        let total = 0;
        cart.forEach((item, index) => {
            const p = parseInt(item.price.replace(/[^0-9]/g, '')) || 0;
            total += (p * item.qty);
            const displayName = currentLang === 'en' ? item.name_en : (currentLang === 'ku' ? item.name_ku : item.name_ar);
            
            const div = document.createElement('div');
            div.className = 'cart-item';
            div.innerHTML = `
                <span>${displayName} (x${item.qty})</span>
                <span>${(p * item.qty).toLocaleString()} <i class="fas fa-trash" onclick="removeFromCart(${index})" style="color:red; margin-left:10px; cursor:pointer"></i></span>`;
            list.appendChild(div);
        });
        priceEl.innerText = total.toLocaleString() + " IQD";
    }

    function setService(t) {
        serviceType = t;
        document.getElementById('fields-outside').style.display = t === 'outside' ? 'block' : 'none';
        document.getElementById('fields-inside').style.display = t === 'inside' ? 'block' : 'none';
        document.getElementById('btn-out').style.backgroundColor = t === 'outside' ? 'var(--primary)' : 'rgba(255,255,255,0.1)';
        document.getElementById('btn-in').style.backgroundColor = t === 'inside' ? 'var(--primary)' : 'rgba(255,255,255,0.1)';
    }

    function sendToFirebase() {
        if (!serviceType) return alert("جۆرێ خزمەتێ هەلبژێرە");
        const order = {
            items: cart.map(i => ({ 
                name: currentLang === 'en' ? i.name_en : (currentLang === 'ku' ? i.name_ku : i.name_ar),
                qty: i.qty,
                price: i.price 
            })),
            total: document.getElementById('total-price').innerText,
            type: serviceType,
            details: serviceType === 'inside' ? { table: document.getElementById('table').value } : { addr: document.getElementById('addr').value, phone: document.getElementById('phone').value },
            time: new Date().toLocaleTimeString()
        };
        db.ref('orders').push(order).then(() => { 
            alert("گەهشتە کاشێری!"); 
            cart = []; 
            updateCartUI(); 
            toggleCart(); 
        });
    }

    function toggleCart() { document.getElementById('cart-panel').classList.toggle('open'); }
    function toggleLang(s = true) { document.getElementById('lang-modal').style.display = s ? 'flex' : 'none'; }

    loadData();
</script>
</body>
</html>
