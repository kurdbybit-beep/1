<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Tech AI - Login</title>
    <style>
        body {
            background: #1e3c72;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: sans-serif;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .google-btn {
            background: white;
            color: #444;
            padding: 12px 25px;
            border-radius: 5px;
            border: none;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px auto;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>بخێرهاتی بۆ Tech AI Link Bio</h2>
        <p>بۆ دروستكرنا لینكا خۆ، ب جیمێلێ داخل ببه‌</p>
        
        <button class="google-btn" onclick="loginWithGoogle()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_Logo.svg" width="20">
            چوونه‌ ژۆر ب ڕێكا Google
        </button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>

    <script>
        // ل ڤێره‌ دڤێت كۆدێ Firebase Config یێ پڕۆژێ خۆ دانی
        const firebaseConfig = {
            apiKey: "AIzaSy...",
            authDomain: "tech-ai-link.firebaseapp.com",
            projectId: "tech-ai-link",
            storageBucket: "tech-ai-link.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };

        firebase.initializeApp(firebaseConfig);

        function loginWithGoogle() {
            var provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider).then((result) => {
                // ده مێ داخل دبيت، دێ چيته‌ سه‌ر لاپه‌ڕێ دروستكرنا لينكێ
                window.location.assign("dashboard.html");
            }).catch((error) => {
                console.log(error.message);
            });
        }
    </script>
</body>
</html>
