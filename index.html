<!DOCTYPE html>
<html dir="rtl" lang="ku">
<head>
    <meta charset="UTF-8">
    <title>سپی فلم - سیستەمێ نوی</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma; background: #0f2027; color: white; text-align: center; padding: 20px; }
        .page { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .btn { display: inline-block; padding: 15px 30px; margin: 10px; background: #2c5364; color: #87E0DC; border-radius: 50px; text-decoration: none; border: 1px solid #87E0DC; font-weight: bold; }
        .movie-card { width: 170px; padding: 10px; background: #203a43; border-radius: 15px; display: inline-block; margin: 10px; cursor: pointer; border: 1px solid #87E0DC; text-decoration: none; color: white; vertical-align: top; }
        img { width: 100%; height: 180px; object-fit: cover; border-radius: 10px; }
        #season-list, #ep-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="p1" class="page" style="display:block;">
    <h2>زمان هەلبژێرە</h2>
    <a href="#" class="btn" onclick="next('p2', 'lang', 'badini')">بادینی</a>
    <a href="#" class="btn" onclick="next('p2', 'lang', 'sorani')">سۆرانی</a>
</div>

<div id="p2" class="page"><h2>جۆرێ فلمی</h2><div id="cat-list"></div></div>
<div id="p3" class="page"><h2>جۆرێ (Genre)</h2><div id="genre-list"></div></div>
<div id="p4" class="page"><h2>فلمی هەلبژێرە</h2><div id="movie-list"></div></div>

<div id="p5" class="page">
    <h2 id="movie-title">سیزنان هەلبژێرە</h2>
    <div id="season-list"></div>
    <br><br><a href="#" class="btn" onclick="next('p4', '', '')">ڤەگەر</a>
</div>

<div id="p6" class="page">
    <h2 id="season-title">حەلقە</h2>
    <div id="ep-list"></div>
    <br><br><a href="#" class="btn" onclick="next('p5', '', '')">ڤەگەرا سیزنان</a>
</div>

<script>
    let data = [], filters = {};

    fetch('https://docs.google.com/spreadsheets/d/e/2PACX-1vQ0d7DwTQ0uVESBq8uHwAus5JD0-fdKI4XyDNSyQ1KZubkfU_keOBB8oMmDvguizoFMNoqujNpIzlio/pub?output=csv')
    .then(res => res.text()).then(csv => {
        data = csv.split('\n').slice(1).map(row => {
            const c = row.split(',');
            return { lang: c[0]?.trim(), cat: c[1]?.trim(), genre: c[2]?.trim(), name: c[3]?.trim(), season: c[4]?.trim(), ep: c[5]?.trim(), link: c[6]?.trim(), img: c[7]?.trim() };
        });
    });

    function next(page, key, val) {
        if(key) filters[key] = val;
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById(page).style.display = 'block';
        updateUI(page);
    }

    function updateUI(page) {
        if(page == 'p2') render('cat-list', 'cat', 'p3');
        if(page == 'p3') {
            const container = document.getElementById('genre-list');
            container.innerHTML = '';
            const genres = [...new Set(data.filter(m => m.lang == filters.lang && m.cat == filters.cat).map(m => m.genre).filter(n => n))];
            genres.forEach(g => container.innerHTML += `<a href="#" class="btn" onclick="next('p4', 'genre', '${g}')">${g}</a>`);
        }
        if(page == 'p4') renderMovies();
        if(page == 'p5') renderSeasons();
        if(page == 'p6') renderEpisodes();
    }

    function render(divId, key, nextPage) {
        const container = document.getElementById(divId);
        container.innerHTML = '';
        const items = [...new Set(data.filter(m => m.lang == filters.lang).map(m => m[key]).filter(n => n))];
        items.forEach(i => container.innerHTML += `<a href="#" class="btn" onclick="next('${nextPage}', '${key}', '${i}')">${i}</a>`);
    }

    function renderMovies() {
        const container = document.getElementById('movie-list');
        container.innerHTML = '';
        const filtered = data.filter(m => m.lang == filters.lang && m.cat == filters.cat && m.genre == filters.genre);
        [...new Set(filtered.map(m => m.name))].forEach(name => {
            const m = data.find(x => x.name == name);
            container.innerHTML += `<div class="movie-card" onclick="next('p5', 'name', '${name}')"><img src="${m.img}"><h3>${name}</h3></div>`;
        });
    }

    function renderSeasons() {
        const container = document.getElementById('season-list');
        container.innerHTML = '';
        const seasons = [...new Set(data.filter(m => m.name == filters.name).map(m => m.season))];
        seasons.forEach(s => {
            container.innerHTML += `<a href="#" class="btn" onclick="next('p6', 'season', '${s}')">${s}</a>`;
        });
    }

    // ل ڤێرە گۆڕانکاری هاتیە کرن دا کو وێنە بکەڤیتە سەر حەلقەیێ
    function renderEpisodes() {
        const container = document.getElementById('ep-list');
        container.innerHTML = '';
        document.getElementById('season-title').innerText = filters.name + " - " + filters.season;
        
        data.filter(m => m.name == filters.name && m.season == filters.season).forEach(m => {
            // نوکە هەر حەلقەیەک دێ وەک کارتەکێ هێتە نیشاندان و وێنەیێ وێ یێ تایبەت ژ ستوونا H هێت شاندن
            container.innerHTML += `
                <a href="${m.link}" class="movie-card">
                    <img src="${m.img}" alt="حەلقە ${m.ep}">
                    <h3>حەلقە ${m.ep}</h3>
                </a>`;
        });
    }
</script>
</body>
</html>
