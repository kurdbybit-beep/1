<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech AI Link Bio</title>
    <!-- Font Awesome بۆ ئایكۆنێن سۆشیال میدیایێ -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #00d2ff;
            --secondary-color: #3a7bd5;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100%;
            transition: background 0.5s ease;
        }

        /* ستایلێن باكگراوندا */
        .bg-1 { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); } /* Tech Blue */
        .bg-2 { background: linear-gradient(135deg, #000000 0%, #434343 100%); } /* Dark Modern */
        .bg-3 { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); } /* Nature Green */
        .bg-4 { background: linear-gradient(135deg, #ff9966 0%, #ff5e62 100%); } /* Sunset */
        .bg-5 { background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%); } /* Purple Blue */
        .bg-6 { background: linear-gradient(135deg, #e6e9f0 0%, #eef1f5 100%); color: #333; } /* Light */

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .profile-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid var(--primary-color);
            margin-bottom: 15px;
            object-fit: cover;
        }

        h1 {
            font-size: 24px;
            margin: 10px 0;
            color: #fff;
        }

        .bg-6 h1 { color: #333; }

        .links-container {
            margin-top: 25px;
        }

        .link-item {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            text-decoration: none;
            padding: 12px 20px;
            margin-bottom: 15px;
            border-radius: 50px;
            font-weight: 600;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .link-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .link-item i {
            margin-left: 15px;
            font-size: 20px;
            width: 25px;
        }

        /* به شێ هه لبژارتنا باكگراوندی */
        .theme-selector {
            margin-top: 30px;
            display: flex;
            gap: 10px;
        }

        .theme-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid #fff;
        }

        .footer-logo {
            margin-top: 40px;
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            letter-spacing: 1px;
        }
        .bg-6 .footer-logo { color: #666; }

    </style>
</head>
<body class="bg-1" id="body-bg">

    <div class="container">
        <div class="profile-card">
            <!-- وێنێ پروفایلی -->
            <img src="https://via.placeholder.com/150" alt="Tech AI User" class="profile-img">
            
            <h1>@falah_mohiuddin</h1>
            <p style="color: #ddd;">Tech AI Link Bio Creator</p>

            <div class="links-container">
                <!-- فه‌یسبووك -->
                <a href="#" class="link-item">
                    <i class="fab fa-facebook" style="color: #1877F2;"></i>
                    <span>فه‌یسبووك</span>
                </a>

                <!-- ئینستاگرام -->
                <a href="#" class="link-item">
                    <i class="fab fa-instagram" style="color: #E4405F;"></i>
                    <span>ئینستاگرام</span>
                </a>

                <!-- تیلیگرام -->
                <a href="#" class="link-item">
                    <i class="fab fa-telegram" style="color: #0088cc;"></i>
                    <span>تیلیگرام</span>
                </a>

                <!-- سناپ چات -->
                <a href="#" class="link-item">
                    <i class="fab fa-snapchat" style="color: #FFFC00; text-shadow: 1px 1px 1px #000;"></i>
                    <span>سناپ چات</span>
                </a>
            </div>

            <!-- هه لبژارتنا ستایلی (Theme) -->
            <div class="theme-selector">
                <div class="theme-btn bg-1" onclick="changeBg('bg-1')"></div>
                <div class="theme-btn bg-2" onclick="changeBg('bg-2')"></div>
                <div class="theme-btn bg-3" onclick="changeBg('bg-3')"></div>
                <div class="theme-btn bg-4" onclick="changeBg('bg-4')"></div>
                <div class="theme-btn bg-5" onclick="changeBg('bg-5')"></div>
                <div class="theme-btn bg-6" onclick="changeBg('bg-6')"></div>
            </div>
        </div>

        <div class="footer-logo">
            <strong>TECH AI</strong> LINK BIO
        </div>
    </div>

    <script>
        function changeBg(bgClass) {
            document.getElementById('body-bg').className = bgClass;
        }
    </script>

</body>
</html>
