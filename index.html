<!DOCTYPE html>
<html lang="en" dir="ltr" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Rest | Modern Menu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&display=swap');

        :root {
            --primary: #38bdf8;
            --accent: #fbbf24;
            --card-bg: rgba(255, 255, 255, 0.08); 
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; transition: all 0.3s ease; }

        body {
            font-family: 'Noto Sans Arabic', sans-serif;
            margin: 0;
            padding-bottom: 50px;
            min-height: 100vh;
            color: #fff;
            background: #020617; /* ئه‌گه‌ر ڤیدیۆ لود نه‌بیت ئه‌ڤ ره‌نگه‌ دێ دیار بیت */
        }

        /* --- Video Background Styling --- */
        .video-bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* دێ چیته‌ بن هه‌می تێشتان */
            overflow: hidden;
        }

        #bgVideo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            object-fit: cover;
            filter: brightness(60%); /* بو هندێ زێده‌ تاری نه‌بیت و ڤیدیۆ دیار بیت */
        }

        .top-nav {
            display: flex;
            gap: 10px;
            padding: 15px 20px;
            position: absolute;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        [dir="ltr"] .top-nav { justify-content: flex-start; }
        [dir="rtl"] .top-nav { justify-content: flex-end; }

        .nav-btn {
            position: relative;
            cursor: pointer;
            background: rgba(56, 189, 248, 0.2);
            padding: 10px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--accent);
            color: #000;
            font-size: 0.7rem;
            font-weight: 900;
            padding: 2px 6px;
            border-radius: 50%;
        }

        header {
            padding: 100px 20px 40px;
            text-align: center;
            background: linear-gradient(to bottom, rgba(2,6,23,0.7), transparent);
        }

        header h1 { font-size: 2.5rem; color: var(--primary); text-transform: uppercase; margin: 0; font-weight: 900; text-shadow: 0 4px 15px rgba(0,0,0,0.5); }

        .social-header {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
        }

        .social-header a {
            color: #fff;
            font-size: 1.5rem;
            background: rgba(255,255,255,0.1);
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(5px);
        }

        .categories-container { 
            position: sticky; top: 0; z-index: 100; 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(15px); padding: 12px 10px; 
            overflow-x: auto; white-space: nowrap; display: flex; gap: 10px;
            border-bottom: 1px solid var(--glass-border);
        }

        .cat-btn { padding: 10px 20px; background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); border-radius: 50px; cursor: pointer; color: white; }
        .cat-btn.active { background: var(--primary); color: #020617; font-weight: bold; }

        .food-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 20px 15px; }

        .food-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .add-btn {
            position: absolute;
            top: 10px;
            background: var(--primary);
            color: #fff;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 5;
        }

        [dir="ltr"] .add-btn { right: 10px; }
        [dir="rtl"] .add-btn { left: 10px; }

        .food-img { width: 100%; height: 130px; background-size: cover; background-position: center; }
        .food-info { padding: 12px; text-align: center; }
        .food-info h3 { font-size: 0.95rem; margin-bottom: 8px; min-height: 40px; }
        .price-tag { background: var(--accent); color: #000; padding: 4px 10px; border-radius: 12px; font-weight: 900; }

        #cart-panel {
            position: fixed; top: 0; width: 85%; height: 100%; background: rgba(15, 23, 42, 0.98);
