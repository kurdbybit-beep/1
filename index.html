<!DOCTYPE html>
<html lang="ku" dir="rtl" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Rest | Modern Menu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&display=swap');

        :root {
            --primary: #38bdf8;
            --accent: #fbbf24;
            --card-bg: rgba(255, 255, 255, 0.05); 
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Noto Sans Arabic', sans-serif;
            margin: 0;
            padding-bottom: 50px;
            min-height: 100vh;
            color: #fff;
            background: linear-gradient(rgba(2, 6, 23, 0.85), rgba(2, 6, 23, 0.85)), 
                        url('https://i.postimg.cc/qRzMnWFV/photo-2026-05-09-18-07-24.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .top-nav {
            display: flex; gap: 10px; padding: 15px 20px;
            position: fixed; width: 100%; top: 0; z-index: 1000;
        }
        [dir="rtl"] .top-nav { justify-content: flex-end; }
        [dir="ltr"] .top-nav { justify-content: flex-start; }

        .nav-btn {
            position: relative; cursor: pointer; background: rgba(56, 189, 248, 0.2);
            padding: 10px; border-radius: 12px; backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border); display: flex; align-items: center;
        }

        #cart-count {
            position: absolute; top: -5px; right: -5px; background: var(--accent);
            color: #000; font-size: 0.75rem; font-weight: 900; padding: 2px 7px; border-radius: 50%;
        }

        header { padding: 100px 20px 30px; text-align: center; }
        header h1 { font-size: 2.5rem; color: var(--primary); font-weight: 900; margin: 0; text-shadow: 0 0 20px rgba(56,189,248,0.5); }

        .categories-container { 
            position: sticky; top: 0; z-index: 100; background: rgba(15, 23, 42, 0.9); 
            backdrop-filter: blur(15px); padding: 15px 10px; overflow-x: auto; display: flex; gap: 12px;
        }

        .cat-btn { 
            padding: 10px 25px; background: rgba(255,255,255,0.05); border-radius: 50px; 
            cursor: pointer; border: 1px solid var(--glass-border); white-space: nowrap; color: #ccc;
        }
        .cat-btn.active { background: var(--primary); color: #000; font-weight: 700; border-color: var(--primary); }

        .food-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; }
        .food-card {
            background: var(--card-bg); border-radius: 20px; overflow: hidden;
            border: 1px solid var(--glass-border); backdrop-filter: blur(5px);
            display: flex; flex-direction: column; position: relative;
        }

        .food-img { width: 100%; height: 140px; background-size: cover; background-position: center; }
        .food-info { padding: 15px; text-align: center; }
        .food-info h3 { font-size: 1rem; margin: 0 0 10px 0; min-height: 45px; }
        .price-tag { background: var(--accent); color: #000; padding: 5px 12px; border-radius: 12px; font-weight: 900; font-size: 0.9rem; }

        .add-btn {
            position: absolute; top: 10px; background: var(--primary); color: #fff;
            border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; z-index: 10;
        }
        [dir="rtl"] .add-btn { left: 10px; }
        [dir="ltr"] .add-btn { right: 10px; }

        /* Cart Panel */
        #cart-panel {
            position: fixed; top: 0; width: 85%; height: 100%; background: #0f172a;
            z-index: 2000; transition: 0.4s ease; padding: 25px; display: flex; flex-direction: column;
        }
        [dir="rtl"] #cart-panel { right: -100%; }
        [dir="ltr"] #cart-panel { left: -100%; }
        [dir="rtl"] #cart-panel.open { right: 0; }
        [dir="ltr"] #cart-panel.open { left: 0; }

        #cart-list { flex-grow: 1; overflow-y: auto; margin: 20px 0; }
        .cart-item {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; margin-bottom: 12px;
        }

        .clear-btn {
            width: 100%; padding: 15px; background: #ef4444; color: #fff;
            border: none; border-radius: 12px; font-weight: 700; cursor: pointer;
        }

        #lang-modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            z-index: 3000; align-items: center; justify-content: center;
        }
        .lang-card { background: #1e293b; padding: 30px; border-radius: 25px; text-align: center; border: 1px solid var(--primary); width: 280px; }
        .lang-opt { padding: 15px; margin: 10px 0; background: rgba(255,255,255,0.05); border-radius: 15px; cursor: pointer; transition: 0.3s; }
        .lang-opt:hover { background: var(--primary); color: #000; }
        
        .menu-section { display: none; }
        .menu-section.active { display: block; }
    </style>
</head>
<body>

<div class="top-nav">
    <div class="nav-btn" onclick="toggleCart()">
        <i class="fas fa-shopping-basket fa-lg" style="color: var(--primary);"></i>
        <span id="cart-count">0</span>
    </div>
    <div class="nav-btn" onclick="toggleLang()">
        <i class="fas fa-language fa-lg" style="color: var(--accent);"></i>
    </div>
</div>

<header><h1>TECH REST</h1></header>

<div id="lang-modal" onclick="toggleLang()">
    <div class="lang-card" onclick="event.stopPropagation()">
        <h3 id="lang-title">زمان هەلبژێرە</h3>
        <div class="lang-opt" onclick="setLang('ku')">کوردی (Badini)</div>
        <div class="lang-opt" onclick="setLang('en')">English</div>
        <div class="lang-opt" onclick="setLang('ar')">العربية</div>
    </div>
</div>

<div id="cart-panel">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2 id="cart-title">سەلکا من</h2>
        <i class="fas fa-times fa-lg" onclick="toggleCart()" style="cursor:pointer"></i>
    </div>
    <div id="cart-list"></div>
    <div style="border-top: 1px solid #333; padding-top: 20px;">
        <h3 style="text-align:center;">Total: <span id="total-price" style="color:var(--accent)">0</span></h3>
        <button class="clear-btn" onclick="clearCart()" id="btn-clear">پاککرنا سەلکێ</button>
    </div>
</div>

<div class="categories-container" id="catBar"></div>
<div id="menuContent"></div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTSRjwZs-DPmh8Cg7LwOa1HTa8m58e4LriIPHbkoxdNp-vcgkNHHsVnp89Dj_TE7xiDLMugKBJRtsBr/pub?output=csv';
    let dataList = [], cart = [], currentLang = 'ku';

    const translations = {
        en: { cart: "My Cart", empty: "Your cart is empty", total: "Total", clear: "Clear Cart", langTitle: "Select Language" },
        ku: { cart: "سەلکا من", empty: "سەلکا تە ڤالایە", total: "کۆم", clear: "پاککرنا سەلکێ", langTitle: "زمان هەلبژێرە" },
        ar: { cart: "سلتي", empty: "السلة فارغة", total: "المجموع", clear: "مسح السلة", langTitle: "اختر اللغة" }
    };

    async function loadData() {
        try {
            const res = await fetch(csvUrl);
            const txt = await res.text();
            const rows = txt.split('\n').slice(1);
            
            dataList = rows.map(r => {
                // پاککرنا داتایان ژ کۆما و نیشانێن زیادە
                const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g, '').trim());
                if (c.length < 4) return null;
                return {
                    name_en: c[0],
                    price: c[1],
                    img: c[2],
                    cat: c[3],
                    name_ku: c[4] || c[0],
                    name_ar: c[5] || c[0]
                };
            }).filter(i => i && i.cat);
            
            renderMenu();
            updateCartUI();
        } catch (e) { console.error("Error loading CSV:", e); }
    }

    function setLang(l) {
        currentLang = l;
        document.getElementById('mainHtml').dir = (l === 'en') ? 'ltr' : 'rtl';
        document.getElementById('cart-title').innerText = translations[l].cart;
        document.getElementById('btn-clear').innerText = translations[l].clear;
        document.getElementById('lang-title').innerText = translations[l].langTitle;
        renderMenu();
        updateCartUI();
        toggleLang(false);
    }

    function renderMenu() {
        const catBar = document.getElementById('catBar');
        const menuContent = document.getElementById('menuContent');
        catBar.innerHTML = ''; menuContent.innerHTML = '';

        const cats = [...new Set(dataList.map(i => i.cat))];
        cats.forEach((cat, index) => {
            const btn = document.createElement('div');
            btn.className = `cat-btn ${index === 0 ? 'active' : ''}`;
            btn.innerText = cat;
            btn.onclick = () => switchCat(cat, btn);
            catBar.appendChild(btn);

            const section = document.createElement('div');
            section.id = `section-${cat.replace(/\s+/g, '-')}`;
            section.className = `menu-section ${index === 0 ? 'active' : ''}`;
            
            const grid = document.createElement('div');
            grid.className = 'food-grid';

            dataList.filter(f => f.cat === cat).forEach(food => {
                const name = currentLang === 'ku' ? food.name_ku : (currentLang === 'ar' ? food.name_ar : food.name_en);
                const card = document.createElement('div');
                card.className = 'food-card';
                card.innerHTML = `
                    <button class="add-btn" onclick="addToCart('${food.name_en.replace(/'/g, "\\'")}')"><i class="fas fa-plus"></i></button>
                    <div class="food-img" style="background-image: url('${food.img}')"></div>
                    <div class="food-info">
                        <h3>${name}</h3>
                        <span class="price-tag">${food.price}</span>
                    </div>`;
                grid.appendChild(card);
            });
            section.appendChild(grid);
            menuContent.appendChild(section);
        });
    }

    function switchCat(cat, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.menu-section').forEach(s => s.classList.remove('active'));
        document.getElementById(`section-${cat.replace(/\s+/g, '-')}`).classList.add('active');
    }

    function addToCart(nameEn) {
        const item = dataList.find(i => i.name_en === nameEn);
        cart.push(item);
        updateCartUI();
    }

    function removeFromCart(index) {
        cart.splice(index, 1);
        updateCartUI();
    }

    function clearCart() {
        cart = [];
        updateCartUI();
    }

    function updateCartUI() {
        const list = document.getElementById('cart-list');
        const count = document.getElementById('cart-count');
        const totalEl = document.getElementById('total-price');

        count.innerText = cart.length;
        list.innerHTML = cart.length === 0 ? `<p style="text-align:center; opacity:0.5;">${translations[currentLang].empty}</p>` : '';

        let total = 0;
        cart.forEach((item, index) => {
            const name = currentLang === 'ku' ? item.name_ku : (currentLang === 'ar' ? item.name_ar : item.name_en);
            const priceNum = parseInt(item.price.replace(/[^0-9]/g, '')) || 0;
            total += priceNum;

            const div = document.createElement('div');
            div.className = 'cart-item';
            div.innerHTML = `
                <span>${name}</span>
                <span>${item.price} <i class="fas fa-trash" onclick="removeFromCart(${index})" style="color:#ef4444; margin-right:10px; cursor:pointer"></i></span>
            `;
            list.appendChild(div);
        });
        totalEl.innerText = total.toLocaleString() + " IQD";
    }

    function toggleCart() { document.getElementById('cart-panel').classList.toggle('open'); }
    function toggleLang(s = true) { document.getElementById('lang-modal').style.display = s ? 'flex' : 'none'; }

    loadData();
</script>
</body>
</html>
