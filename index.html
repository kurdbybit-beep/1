<!DOCTYPE html>
<html lang="en" dir="ltr" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Rest | Modern Menu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&display=swap');

        :root {
            --primary: #38bdf8;
            --accent: #fbbf24;
            --card-bg: rgba(255, 255, 255, 0.03); 
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; transition: all 0.3s ease; }

        body {
            font-family: 'Noto Sans Arabic', sans-serif;
            margin: 0;
            padding-bottom: 50px;
            min-height: 100vh;
            color: #fff;
            background: linear-gradient(rgba(2, 6, 23, 0.7), rgba(2, 6, 23, 0.7)), 
                        url('https://i.postimg.cc/qRzMnWFV/photo-2026-05-09-18-07-24.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }

        .top-nav {
            display: flex;
            gap: 10px;
            padding: 15px 20px;
            position: absolute;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        [dir="ltr"] .top-nav { justify-content: flex-start; }
        [dir="rtl"] .top-nav { justify-content: flex-end; }

        .nav-btn {
            position: relative;
            cursor: pointer;
            background: rgba(56, 189, 248, 0.2);
            padding: 10px;
            border-radius: 12px;
            backdrop-filter: blur(5px);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--accent);
            color: #000;
            font-size: 0.7rem;
            font-weight: 900;
            padding: 2px 6px;
            border-radius: 50%;
        }

        header {
            padding: 70px 20px 30px;
            text-align: center;
            background: linear-gradient(to bottom, rgba(2,6,23,0.8), transparent);
        }

        header h1 { font-size: 2.2rem; color: var(--primary); text-transform: uppercase; margin: 0; }

        .food-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; }

        .food-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .add-btn {
            position: absolute;
            top: 10px;
            background: var(--primary);
            color: #fff;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 5;
        }

        [dir="ltr"] .add-btn { right: 10px; }
        [dir="rtl"] .add-btn { left: 10px; }

        .food-img { width: 100%; height: 130px; background-size: cover; background-position: center; }
        .food-info { padding: 12px; text-align: center; flex-grow: 1; }
        .food-info h3 { font-size: 0.95rem; margin-bottom: 8px; min-height: 40px; }
        .price-tag { background: var(--accent); color: #000; padding: 4px 10px; border-radius: 12px; font-weight: 900; }

        #cart-panel {
            position: fixed;
            top: 0;
            width: 85%;
            height: 100%;
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(20px);
            z-index: 2000;
            transition: 0.4s ease;
            padding: 20px;
        }

        [dir="ltr"] #cart-panel { left: -100%; }
        [dir="rtl"] #cart-panel { right: -100%; }
        [dir="ltr"] #cart-panel.open { left: 0; }
        [dir="rtl"] #cart-panel.open { right: 0; }

        .cart-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px; }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .categories-container { 
            position: sticky; top: 0; z-index: 100; 
            background: rgba(15, 23, 42, 0.9); 
            backdrop-filter: blur(15px); padding: 12px 10px; 
            overflow-x: auto; white-space: nowrap; display: flex; gap: 10px;
        }

        .cat-btn { padding: 10px 20px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 50px; cursor: pointer; }
        .cat-btn.active { background: var(--primary); color: #020617; }
        .menu-section { display: none; }
        .menu-section.active { display: block; }

        #lang-modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            z-index: 3000; align-items: center; justify-content: center;
        }
        .lang-card { background: #1e293b; padding: 25px; border-radius: 20px; width: 250px; text-align: center; border: 1px solid var(--primary); }
        .lang-opt { padding: 12px; margin: 10px 0; background: rgba(255,255,255,0.05); border-radius: 10px; cursor: pointer; }
        .lang-opt:hover { background: var(--primary); color: #000; }
    </style>
</head>
<body>

<div class="top-nav">
    <div class="nav-btn" onclick="toggleCart()">
        <i class="fas fa-shopping-basket fa-lg" style="color: var(--primary);"></i>
        <span id="cart-count">0</span>
    </div>
    <div class="nav-btn" onclick="toggleLang()">
        <i class="fas fa-language fa-lg" style="color: var(--accent);"></i>
    </div>
</div>

<header>
    <h1>TECH REST</h1>
</header>

<div id="lang-modal" onclick="toggleLang()">
    <div class="lang-card" onclick="event.stopPropagation()">
        <h3 id="lang-title">Select Language</h3>
        <div class="lang-opt" onclick="setLang('en')">English</div>
        <div class="lang-opt" onclick="setLang('ku')">کوردی</div>
        <div class="lang-opt" onclick="setLang('ar')">العربية</div>
    </div>
</div>

<div id="cart-panel">
    <div class="cart-header">
        <h2 id="cart-title">My Cart</h2>
        <i class="fas fa-times fa-lg" onclick="toggleCart()" style="cursor: pointer;"></i>
    </div>
    <div class="cart-items" id="cart-list"></div>
    <div class="cart-total" style="text-align: center; padding-top: 20px; border-top: 1px dashed #444;">
        <h3 id="total-text">Total: <span id="total-price" style="color: var(--accent);">0 IQD</span></h3>
        <button class="nav-btn" id="btn-clear" onclick="clearCart()" style="width: 100%; background: #ff444422; color: #ff4444; border: 1px solid #ff4444;">Clear All</button>
    </div>
</div>

<div class="categories-container" id="catBar"></div>
<div id="menuContent"></div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTSRjwZs-DPmh8Cg7LwOa1HTa8m58e4LriIPHbkoxdNp-vcgkNHHsVnp89Dj_TE7xiDLMugKBJRtsBr/pub?output=csv';
    let dataList = [];
    let cart = [];
    let currentLang = 'en';

    const translations = {
        en: { cart: "My Cart", empty: "Your cart is empty", total: "Total", clear: "Clear All", langTitle: "Select Language" },
        ku: { cart: "سەلکا من", empty: "سەلک ڤالایە", total: "کۆم", clear: "پاککرنا هەمیێ", langTitle: "زمانەکێ هەلبژێرە" },
        ar: { cart: "سلتي", empty: "السلة فارغة", total: "المجموع", clear: "مسح الكل", langTitle: "اختر اللغة" }
    };

    async function loadData() {
        try {
            const res = await fetch(csvUrl);
            const txt = await res.text();
            const rows = txt.split('\n').slice(1);
            dataList = rows.map(r => {
                const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g, '').trim());
                return { 
                    name_en: c[0], 
                    name_ku: c[4] || c[0], 
                    name_ar: c[5] || c[0], 
                    price: c[1], 
                    img: c[2], 
                    cat: c[3] 
                };
            }).filter(i => i.cat);
            setLang('en');
        } catch (e) { console.error(e); }
    }

    function setLang(lang) {
        currentLang = lang;
        const html = document.getElementById('mainHtml');
        html.dir = (lang === 'en') ? 'ltr' : 'rtl';
        
        document.getElementById('cart-title').innerText = translations[lang].cart;
        document.getElementById('btn-clear').innerText = translations[lang].clear;
        document.getElementById('lang-title').innerText = translations[lang].langTitle;
        
        renderMenu(); // ڤێرێ ناڤێن خوارنێ ل سەر شاشێ دهێنە گوهۆڕین
        updateCartUI(); // ڤێرێ ناڤێن خوارنێ د ناڤ سەلکێ دا دهێنە گوهۆڕین
        toggleLang(false);
    }

    function renderMenu() {
        const catBar = document.getElementById('catBar');
        const menuContent = document.getElementById('menuContent');
        catBar.innerHTML = ''; menuContent.innerHTML = '';
        
        const cats = [...new Set(dataList.map(i => i.cat))];
        cats.forEach((cat, index) => {
            const btn = document.createElement('div');
            btn.className = `cat-btn ${index === 0 ? 'active' : ''}`;
            btn.innerText = cat;
            btn.onclick = () => switchCat(cat, btn);
            catBar.appendChild(btn);

            const section = document.createElement('div');
            section.id = `section-${cat}`;
            section.className = `menu-section ${index === 0 ? 'active' : ''}`;
            const gridDiv = document.createElement('div');
            gridDiv.className = 'food-grid';
            
            dataList.filter(f => f.cat === cat).forEach(food => {
                const displayName = food[`name_${currentLang}`];
                const card = document.createElement('div');
                card.className = 'food-card';
                card.innerHTML = `
                    <button class="add-btn" onclick="addToCart(${dataList.indexOf(food)})"><i class="fas fa-plus"></i></button>
                    <div class="food-img" style="background-image: url('${food.img}')"></div>
                    <div class="food-info">
                        <h3>${displayName}</h3>
                        <span class="price-tag">${food.price}</span>
                    </div>
                `;
                gridDiv.appendChild(card);
            });
            section.appendChild(gridDiv);
            menuContent.appendChild(section);
        });
    }

    function switchCat(catName, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.menu-section').forEach(s => s.classList.remove('active'));
        document.getElementById(`section-${catName}`).classList.add('active');
    }

    function addToCart(index) {
        cart.push(dataList[index]);
        updateCartUI();
    }

    function clearCart() { cart = []; updateCartUI(); }
    function removeFromCart(index) { cart.splice(index, 1); updateCartUI(); }

    function updateCartUI() {
        const cartList = document.getElementById('cart-list');
        const cartCount = document.getElementById('cart-count');
        const totalPriceEl = document.getElementById('total-price');
        
        cartCount.innerText = cart.length;
        cartList.innerHTML = cart.length === 0 ? `<p style="text-align: center; opacity: 0.5;">${translations[currentLang].empty}</p>` : '';
        
        let total = 0;
        cart.forEach((item, index) => {
            // ئەڤە پشکا گرنگە کو ناڤێ د ناڤ سەلکێ دا دگەل زمانێ هەلبژارتی بگوهۆڕیت
            const displayName = item[`name_${currentLang}`];
            const itemDiv = document.createElement('div');
            itemDiv.className = 'cart-item';
            itemDiv.innerHTML = `
                <span>${displayName}</span>
                <span>${item.price} <i class="fas fa-trash" style="color: #ff4444; cursor: pointer; margin: 0 10px;" onclick="removeFromCart(${index})"></i></span>
            `;
            cartList.appendChild(itemDiv);
            total += parseInt(item.price.replace(/[^0-9]/g, '')) || 0;
        });
        totalPriceEl.innerText = total.toLocaleString() + " IQD";
    }

    function toggleLang(show = true) {
        const modal = document.getElementById('lang-modal');
        modal.style.display = (show && modal.style.display !== 'flex') ? 'flex' : 'none';
    }

    function toggleCart() { document.getElementById('cart-panel').classList.toggle('open'); }

    loadData();
</script>
</body>
</html>
