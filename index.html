<!DOCTYPE html>
<html lang="ku" dir="rtl" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Solutions | Digital Catalog</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&display=swap');

        :root {
            --primary: #0ea5e9; /* شینێ ئینرجی */
            --accent: #10b981;  /* کەسکێ پاتری و ژینگێ */
            --card-bg: rgba(15, 23, 42, 0.7); 
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Noto Sans Arabic', sans-serif;
            margin: 0;
            padding-bottom: 50px;
            min-height: 100vh;
            color: #fff;
            background: linear-gradient(rgba(2, 6, 23, 0.9), rgba(2, 6, 23, 0.9)), 
                        url('https://images.unsplash.com/photo-1473341304170-971dccb5ac1e?q=80&w=2070&auto=format&fit=crop'); /* وێنەکێ باکگراوند یێ ئینرجی */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .top-nav {
            display: flex; gap: 10px; padding: 15px 20px;
            position: fixed; width: 100%; top: 0; z-index: 1000;
        }
        [dir="rtl"] .top-nav { justify-content: flex-end; }
        [dir="ltr"] .top-nav { justify-content: flex-start; }

        .nav-btn {
            position: relative; cursor: pointer; background: rgba(14, 165, 233, 0.2);
            padding: 10px; border-radius: 12px; backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border); display: flex; align-items: center;
        }

        #cart-count {
            position: absolute; top: -5px; right: -5px; background: var(--accent);
            color: #fff; font-size: 0.75rem; font-weight: 900; padding: 2px 7px; border-radius: 50%;
        }

        header { padding: 100px 20px 30px; text-align: center; }
        header h1 { font-size: 2.2rem; color: var(--primary); font-weight: 900; margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        header p { opacity: 0.7; margin-top: 10px; font-size: 0.9rem; }

        .categories-container { 
            position: sticky; top: 0; z-index: 100; background: rgba(15, 23, 42, 0.95); 
            backdrop-filter: blur(15px); padding: 15px 10px; overflow-x: auto; display: flex; gap: 12px;
            border-bottom: 1px solid var(--glass-border);
        }

        .cat-btn { 
            padding: 10px 25px; background: rgba(255,255,255,0.05); border-radius: 50px; 
            cursor: pointer; border: 1px solid var(--glass-border); white-space: nowrap; color: #ccc;
            transition: 0.3s;
        }
        .cat-btn.active { background: var(--primary); color: #fff; font-weight: 700; border-color: var(--primary); box-shadow: 0 0 15px rgba(14, 165, 233, 0.4); }

        .food-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 15px; }
        .food-card {
            background: var(--card-bg); border-radius: 20px; overflow: hidden;
            border: 1px solid var(--glass-border); backdrop-filter: blur(5px);
            display: flex; flex-direction: column; position: relative;
            transition: transform 0.3s;
        }
        .food-card:hover { transform: translateY(-5px); }

        .food-img { width: 100%; height: 150px; background-size: cover; background-position: center; background-color: #333; }
        .food-info { padding: 15px; text-align: center; }
        .food-info h3 { font-size: 1rem; margin: 0 0 10px 0; min-height: 45px; color: #f8fafc; }
        .price-tag { background: var(--accent); color: #fff; padding: 5px 12px; border-radius: 12px; font-weight: 900; font-size: 0.85rem; }

        .add-btn {
            position: absolute; top: 10px; background: var(--primary); color: #fff;
            border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; z-index: 10;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        [dir="rtl"] .add-btn { left: 10px; }
        [dir="ltr"] .add-btn { right: 10px; }

        #cart-panel {
            position: fixed; top: 0; width: 320px; max-width: 85%; height: 100%; background: #0f172a;
            z-index: 2000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 25px; display: flex; flex-direction: column;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }
        [dir="rtl"] #cart-panel { right: -350px; }
        [dir="ltr"] #cart-panel { left: -350px; }
        [dir="rtl"] #cart-panel.open { right: 0; }
        [dir="ltr"] #cart-panel.open { left: 0; }

        #cart-list { flex-grow: 1; overflow-y: auto; margin: 20px 0; }
        .cart-item {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.05); padding: 12px; border-radius: 15px; margin-bottom: 12px;
            border: 1px solid var(--glass-border);
        }

        .clear-btn {
            width: 100%; padding: 15px; background: #ef4444; color: #fff;
            border: none; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 10px;
        }
        
        .order-btn {
            width: 100%; padding: 15px; background: var(--accent); color: #fff;
            border: none; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 10px;
        }

        #lang-modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            z-index: 3000; align-items: center; justify-content: center; backdrop-filter: blur(5px);
        }
        .lang-card { background: #1e293b; padding: 30px; border-radius: 25px; text-align: center; border: 1px solid var(--primary); width: 280px; }
        .lang-opt { padding: 15px; margin: 10px 0; background: rgba(255,255,255,0.05); border-radius: 15px; cursor: pointer; transition: 0.3s; }
        .lang-opt:hover { background: var(--primary); color: #fff; }
        
        .menu-section { display: none; }
        .menu-section.active { display: block; }
        
        /* Loading animation */
        #loader { text-align: center; padding: 50px; color: var(--primary); }
    </style>
</head>
<body>

<div class="top-nav">
    <div class="nav-btn" onclick="toggleCart()">
        <i class="fas fa-bolt fa-lg" style="color: var(--primary);"></i>
        <span id="cart-count">0</span>
    </div>
    <div class="nav-btn" onclick="toggleLang()">
        <i class="fas fa-globe fa-lg" style="color: var(--accent);"></i>
    </div>
</div>

<header>
    <h1 id="brand-name">ENERGY SOLUTIONS</h1>
    <p id="brand-tagline">برهەمێن وزێ یێن سەردەم</p>
</header>

<div id="lang-modal" onclick="toggleLang()">
    <div class="lang-card" onclick="event.stopPropagation()">
        <h3 id="lang-title">زمان هەلبژێرە</h3>
        <div class="lang-opt" onclick="setLang('ku')">کوردی (Badini)</div>
        <div class="lang-opt" onclick="setLang('en')">English</div>
        <div class="lang-opt" onclick="setLang('ar')">العربية</div>
    </div>
</div>

<div id="cart-panel">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2 id="cart-title">داخوازیا من</h2>
        <i class="fas fa-times fa-lg" onclick="toggleCart()" style="cursor:pointer"></i>
    </div>
    <div id="cart-list"></div>
    <div style="border-top: 1px solid #333; padding-top: 20px;">
        <h3 style="text-align:center;">Total: <span id="total-price" style="color:var(--accent)">0</span></h3>
        <button class="order-btn" onclick="alert('Sent to WhatsApp!')">Order Now</button>
        <button class="clear-btn" onclick="clearCart()" id="btn-clear">پاککرنا سەلکێ</button>
    </div>
</div>

<div class="categories-container" id="catBar"></div>
<div id="loader"><i class="fas fa-spinner fa-spin fa-2x"></i></div>
<div id="menuContent"></div>

<script>
    // لینکێ خشتەیێ تە یێ ئینرجیێ
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTazbpu68cYu5CfWoSpaAByUenwNZExMEOCeuk2f7ZwyNf8KsCPaMht5p2u8AGwXO8TKWymzX1dwE9Y/pub?output=csv';
    
    let dataList = [], cart = [], currentLang = 'ku';

    const translations = {
        en: { cart: "My Order", empty: "No items selected", total: "Total", clear: "Clear All", langTitle: "Select Language", tagline: "Modern Energy Solutions" },
        ku: { cart: "داخوازیا من", empty: "چ نینە د سەلکێ دا", total: "کۆم", clear: "پاککرنا سەلکێ", langTitle: "زمان هەلبژێرە", tagline: "برهەمێن وزێ یێن سەردەم" },
        ar: { cart: "طلباتي", empty: "السلة فارغة", total: "المجموع", clear: "مسح السلة", langTitle: "اختر اللغة", tagline: "حلول الطاقة الحديثة" }
    };

    async function loadData() {
        try {
            const res = await fetch(csvUrl);
            const txt = await res.text();
            const rows = txt.split('\n').slice(1);
            
            dataList = rows.map(r => {
                const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g, '').trim());
                if (c.length < 4) return null;
                return {
                    name_en: c[0],
                    price: c[1],
                    img: c[2],
                    cat: c[3],
                    name_ku: c[4] || c[0],
                    name_ar: c[5] || c[0]
                };
            }).filter(i => i && i.cat);
            
            document.getElementById('loader').style.display = 'none';
            renderMenu();
            updateCartUI();
        } catch (e) { 
            console.error("Error loading CSV:", e);
            document.getElementById('loader').innerHTML = "Error loading data.";
        }
    }

    function setLang(l) {
        currentLang = l;
        document.getElementById('mainHtml').dir = (l === 'en') ? 'ltr' : 'rtl';
        document.getElementById('cart-title').innerText = translations[l].cart;
        document.getElementById('btn-clear').innerText = translations[l].clear;
        document.getElementById('lang-title').innerText = translations[l].langTitle;
        document.getElementById('brand-tagline').innerText = translations[l].tagline;
        renderMenu();
        updateCartUI();
        toggleLang(false);
    }

    function renderMenu()
