<!DOCTYPE html>
<html lang="ku" dir="rtl" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Sweet | Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&display=swap');

        :root {
            --primary: #fbbf24;
            --accent: #fbbf24; 
            --danger: #ef4444;
            --bg-color: #fcfaf2;
            --text-color: #1e293b;
            --card-bg: #ffffff;
            --glass-border: rgba(0, 0, 0, 0.08);
            --nav-bg: rgba(255, 255, 255, 0.8);
        }

        body.dark-mode {
            --bg-color: #1a1a1a; 
            --text-color: #f1f5f9;
            --card-bg: #2d2d2d;
            --glass-border: rgba(255, 255, 255, 0.1);
            --nav-bg: rgba(30, 30, 30, 0.9);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; transition: all 0.2s ease; }

        body {
            font-family: 'Noto Sans Arabic', sans-serif;
            margin: 0; padding-bottom: 50px; min-height: 100vh; 
            color: var(--text-color);
            background-color: var(--bg-color);
        }

        .top-nav {
            display: flex; gap: 12px; padding: 15px 20px;
            position: fixed; width: 100%; top: 0; z-index: 1000;
            justify-content: flex-end; align-items: center;
        }

        .nav-btn {
            cursor: pointer; background: var(--nav-bg);
            padding: 12px; border-radius: 15px; 
            backdrop-filter: blur(10px); border: 1px solid var(--glass-border); 
            display: flex; align-items: center; color: var(--text-color);
        }

        .theme-toggle { margin-right: auto; background: var(--primary); color: #000; width: 45px; height: 45px; justify-content: center; }

        header { padding: 100px 20px 20px; text-align: center; }
        header h1 { font-size: 3.2rem; color: var(--accent); font-weight: 900; margin: 0; line-height: 1; text-transform: uppercase; }
        
        .categories-container { 
            position: sticky; top: 0; z-index: 100; 
            background: var(--nav-bg); backdrop-filter: blur(20px); 
            padding: 15px 10px; overflow-x: auto; display: flex; gap: 12px;
            border-bottom: 1px solid var(--glass-border);
        }
        
        .cat-btn { 
            padding: 10px 25px; background: rgba(0,0,0,0.05); border-radius: 50px; 
            cursor: pointer; border: 1px solid var(--glass-border); white-space: nowrap; 
            color: var(--text-color); font-weight: 700; 
        }
        .cat-btn.active { background: var(--accent); color: #000; border: none; font-weight: 900; }

        .food-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; }
        .food-card {
            background: var(--card-bg); border-radius: 20px; overflow: hidden;
            border: 1px solid var(--glass-border); position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .food-img { width: 100%; height: 130px; background-size: cover; background-position: center; background-color: #eee; }
        .food-info { padding: 12px; text-align: center; }
        .price-tag { background: var(--accent); color: #000; padding: 4px 10px; border-radius: 10px; font-weight: 900; }
        .add-btn { position: absolute; top: 10px; left: 10px; background: var(--primary); color: #000; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; z-index: 5; }
        .del-btn { position: absolute; top: 10px; right: 10px; background: var(--danger); color: white; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; display: none; z-index: 5; }

        #cart-panel {
            position: fixed; top: 0; right: -100%; width: 100%; max-width: 400px; height: 100%; 
            background: var(--bg-color); z-index: 2000; transition: 0.4s; padding: 25px; 
            display: flex; flex-direction: column; box-shadow: -5px 0 20px rgba(0,0,0,0.1);
        }
        #cart-panel.open { right: 0; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); z-index: 3000; align-items: center; justify-content: center; padding: 20px; }
        .modal-card { background: var(--card-bg); padding: 30px; border-radius: 25px; width: 100%; max-width: 400px; text-align: center; color: var(--text-color); border: 1px solid var(--glass-border); overflow-y: auto; max-height: 90vh; }
        .modal-card input, .modal-card select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; border: 1px solid var(--glass-border); background: var(--bg-color); color: var(--text-color); font-family: inherit; }

        #admin-add-trigger {
            position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px;
            background: var(--accent); color: #000; border-radius: 50%;
            display: none; align-items: center; justify-content: center;
            font-size: 24px; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            cursor: pointer; z-index: 1500;
        }

        .empty-msg { text-align: center; padding: 50px; opacity: 0.5; grid-column: span 2; }
    </style>
</head>
<body>

<div class="top-nav">
    <div class="nav-btn theme-toggle" onclick="toggleTheme()"><i id="theme-icon" class="fas fa-moon"></i></div>
    <div class="nav-btn" onclick="openLoginModal()"><i class="fas fa-user-shield"></i></div>
    <div class="nav-btn" onclick="toggleLang()"><span id="lang-label" style="font-weight: 900;">KU</span></div>
    <div class="nav-btn" onclick="toggleCart()">
        <i class="fas fa-shopping-basket" style="color: #000;"></i>
        <span id="cart-count" style="margin-right:5px; font-weight:900;">0</span>
    </div>
</div>

<header>
    <h1>TECH SWEET</h1>
    <div style="font-weight: 700; opacity: 0.7;">Best Sweets & Treats</div>
</header>

<div id="cart-panel">
    <h2 id="t-cart-title" style="color: var(--primary);">سەلکا من</h2>
    <div id="cart-list" style="flex-grow:1; overflow-y:auto;"></div>
    <div style="padding:20px 0; border-top:2px solid var(--glass-border);">
        <span id="t-total-label">کۆمێ گشتی:</span>
        <h2 style="margin:5px 0;"><span id="grand-total">0</span> IQD</h2>
    </div>
    <button style="background: var(--danger); color: white; padding: 15px; border-radius: 12px; border:none; margin-bottom:10px; cursor:pointer; width:100%; font-weight:700;" onclick="clearCart()" id="t-clear-btn">پاککرنا سەلکێ</button>
    <button style="background: var(--primary); color: #000; padding: 15px; border-radius: 12px; border:none; cursor:pointer; width:100%; font-weight:900;" onclick="toggleCart()" id="t-close-btn">بەردەوام بە</button>
</div>

<div id="login-modal" class="modal">
    <div class="modal-card">
        <h3 id="t-login-title">چوونا ژوورێ (Admin)</h3>
        <input type="text" id="admin-user" placeholder="User Name">
        <input type="password" id="admin-pass" placeholder="Password">
        <button onclick="handleLogin()" style="width:100%; padding:15px; background:var(--accent); border:none; border-radius:12px; font-weight:900; cursor:pointer;">دۆپاتکرن</button>
        <button onclick="closeModal('login-modal')" style="background:none; border:none; color:var(--text-color); margin-top:15px; cursor:pointer;">داخستن</button>
    </div>
</div>

<div id="add-modal" class="modal">
    <div class="modal-card">
        <h3 id="t-add-title">زێدەکرنا ئایتمێ نوو</h3>
        <input type="text" id="new-name-ku" placeholder="ناڤ ب کوردی">
        <input type="text" id="new-name-en" placeholder="ناڤ ب ئینگلیزی">
        <input type="text" id="new-name-ar" placeholder="ناڤ ب عەرەبی">
        <input type="text" id="new-price" placeholder="بها (نموونە: 5,000)">
        <input type="text" id="new-img" placeholder="لینکا وێنەی">
        <div style="margin: 10px 0; border: 1px dashed var(--accent); padding: 10px; border-radius: 10px;">
            <small>بەشەکێ هەلبژێرە یان یێ نوو چێکە:</small>
            <input type="text" id="new-cat-manual" placeholder="ناڤێ بەشەکێ نوو (نموونە: کێک)">
            <select id="new-cat-select">
                <option value="">یان بەشەکێ هەلبژێرە</option>
            </select>
        </div>
        <button onclick="addNewItem()" style="width:100%; padding:15px; background:var(--accent); border:none; border-radius:12px; font-weight:900;">زێدە بکە</button>
        <button onclick="closeModal('add-modal')" style="background:none; border:none; color:var(--text-color); margin-top:15px;">پەشیمان بوون</button>
    </div>
</div>

<div id="admin-add-trigger" onclick="openAddModal()"><i class="fas fa-plus"></i></div>

<div class="categories-container" id="catBar"></div>
<div id="menuContent"></div>

<script>
    let dataList = [], cart = {}, currentLang = 'ku', isAdmin = false;

    const translations = {
        ku: {
            cartTitle: "سەلکا من", total: "کۆمێ گشتی:", clear: "پاککرنا سەلکێ", close: "بەردەوام بە",
            login: "چوونا ژوورێ (Admin)", add: "زێدەکرنا ئایتمێ نوو",
            welcome: "بخێرهاتی کاک فەلاح", empty: "هیچ ئایتمەک نینە، تکایە ئایتمان زێدە بکە"
        },
        en: {
            cartTitle: "My Cart", total: "Total:", clear: "Clear Cart", close: "Continue",
            login: "Admin Login", add: "Add New Item",
            welcome: "Welcome Admin Falah", empty: "No items found. Please add items via Admin."
        },
        ar: {
            cartTitle: "سلتي", total: "المجموع:", clear: "تفريغ السلة", close: "استمرار",
            login: "دخول المشرف", add: "اضافة مادة جديدة",
            welcome: "اهلا بك فلاح", empty: "لا توجد مواد، يرجى اضافة مواد جديدة"
        }
    };

    function loadData() {
        // Only load from LocalStorage (No Google Sheets)
        dataList = JSON.parse(localStorage.getItem('techSweetData') || '[]');
        renderMenu();
        updateUIStrings();
    }

    function updateUIStrings() {
        const t = translations[currentLang];
        document.getElementById('t-cart-title').innerText = t.cartTitle;
        document.getElementById('t-total-label').innerText = t.total;
        document.getElementById('t-clear-btn').innerText = t.clear;
        document.getElementById('t-close-btn').innerText = t.close;
        document.getElementById('t-login-title').innerText = t.login;
        document.getElementById('t-add-title').innerText = t.add;
    }

    function renderMenu() {
        const catBar = document.getElementById('catBar');
        const menuContent = document.getElementById('menuContent');
        const catSelect = document.getElementById('new-cat-select');
        
        catBar.innerHTML = ''; menuContent.innerHTML = ''; 
        catSelect.innerHTML = '<option value="">یان بەشەکێ هەلبژێرە</option>';
        
        if (dataList.length === 0) {
            menuContent.innerHTML = `<div class="empty-msg">${translations[currentLang].empty}</div>`;
            return;
        }

        const cats = [...new Set(dataList.map(i => i.cat))];
        cats.forEach((cat, index) => {
            catSelect.innerHTML += `<option value="${cat}">${cat}</option>`;
            
            const btn = document.createElement('div');
            btn.className = `cat-btn ${index === 0 ? 'active' : ''}`;
            btn.innerText = cat;
            btn.onclick = () => {
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.menu-section').forEach(s => s.style.display = 'none');
                document.getElementById(`sec-${cat.replace(/\s+/g, '-')}`).style.display = 'block';
            };
            catBar.appendChild(btn);

            const section = document.createElement('div');
            section.id = `sec-${cat.replace(/\s+/g, '-')}`;
            section.className = 'menu-section';
            section.style.display = index === 0 ? 'block' : 'none';
            const grid = document.createElement('div');
            grid.className = 'food-grid';

            dataList.filter(f => f.cat === cat).forEach(food => {
                const name = currentLang === 'ku' ? food.name_ku : (currentLang === 'ar' ? food.name_ar : food.name_en);
                grid.innerHTML += `
                    <div class="food-card">
                        <button class="add-btn" onclick="addToCart('${food.id}')"><i class="fas fa-plus"></i></button>
                        <button class="del-btn" style="display:${isAdmin?'block':'none'}" onclick="deleteItem('${food.id}')"><i class="fas fa-trash"></i></button>
                        <div class="food-img" style="background-image: url('${food.img}')"></div>
                        <div class="food-info">
                            <h3 style="font-size:0.9rem; margin:5px 0;">${name}</h3>
                            <span class="price-tag">${food.price} IQD</span>
                        </div>
                    </div>`;
            });
            section.appendChild(grid);
            menuContent.appendChild(section);
        });
    }

    function handleLogin() {
        const u = document.getElementById('admin-user').value;
        const p = document.getElementById('admin-pass').value;
        if(u === 'falah' && p === 'falah') {
            isAdmin = true;
            document.getElementById('admin-add-trigger').style.display = 'flex';
            closeModal('login-modal');
            renderMenu();
            alert(translations[currentLang].welcome);
        } else {
            alert("فێلبازی نه‌كه‌! ناڤ یان پاسوۆرد خه‌له‌ته‌");
        }
    }

    function addNewItem() {
        const manualCat = document.getElementById('new-cat-manual').value.trim();
        const selectedCat = document.getElementById('new-cat-select').value;
        const finalCat = manualCat || selectedCat;

        if(!finalCat || !document.getElementById('new-name-ku').value) {
            alert("تکایە هەمی زانیاریان تژی بکە");
            return;
        }

        const newItem = {
            id: 'item-' + Date.now(),
            name_ku: document.getElementById('new-name-ku').value,
            name_en: document.getElementById('new-name-en').value,
            name_ar: document.getElementById('new-name-ar').value,
            price: document.getElementById('new-price').value,
            img: document.getElementById('new-img').value,
            cat: finalCat
        };

        dataList.push(newItem);
        localStorage.setItem('techSweetData', JSON.stringify(dataList));
        
        // Reset fields
        document.getElementById('new-name-ku').value = '';
        document.getElementById('new-price').value = '';
        document.getElementById('new-img').value = '';
        document.getElementById('new-cat-manual').value = '';
        
        renderMenu();
        closeModal('add-modal');
    }

    function deleteItem(id) {
        if(confirm("تو پشت راستی ژ رەشکرنێ؟")) {
            dataList = dataList.filter(i => i.id !== id);
            localStorage.setItem('techSweetData', JSON.stringify(dataList));
            renderMenu();
        }
    }

    function addToCart(id) {
        const item = dataList.find(i => i.id === id);
        if(cart[id]) cart[id].qty++;
        else cart[id] = {...item, qty: 1};
        updateCartUI();
    }

    function updateCartUI() {
        const list = document.getElementById('cart-list');
        list.innerHTML = '';
        let totalItems = 0, grandTotal = 0;
        Object.values(cart).forEach(item => {
            totalItems += item.qty;
            let priceNum = parseInt(item.price.replace(/,/g, '').replace(/[^\d]/g, '')) || 0;
            grandTotal += (priceNum * item.qty);
            const name = currentLang === 'ku' ? item.name_ku : (currentLang === 'ar' ? item.name_ar : item.name_en);
            list.innerHTML += `<div class="cart-item">
                <div style="flex-grow:1;"><b>${name}</b><br><small>${item.price} IQD</small></div>
                <div class="cart-controls">
                    <button class="qty-btn" onclick="changeQty('${item.id}',-1)">-</button>
                    <span>${item.qty}</span>
                    <button class="qty-btn" onclick="changeQty('${item.id}',1)">+</button>
                </div>
            </div>`;
        });
        document.getElementById('cart-count').innerText = totalItems;
        document.getElementById('grand-total').innerText = grandTotal.toLocaleString();
    }

    function changeQty(id, d) {
        cart[id].qty += d;
        if(cart[id].qty <= 0) delete cart[id];
        updateCartUI();
    }

    function toggleLang() {
        currentLang = currentLang === 'ku' ? 'en' : (currentLang === 'en' ? 'ar' : 'ku');
        document.getElementById('lang-label').innerText = currentLang.toUpperCase();
        document.getElementById('mainHtml').dir = currentLang === 'en' ? 'ltr' : 'rtl';
        updateUIStrings();
        renderMenu();
    }

    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        document.getElementById('theme-icon').className = document.body.classList.contains('dark-mode') ? 'fas fa-sun' : 'fas fa-moon';
    }

    function openLoginModal() { document.getElementById('login-modal').style.display = 'flex'; }
    function openAddModal() { document.getElementById('add-modal').style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function toggleCart() { document.getElementById('cart-panel').classList.toggle('open'); }
    function clearCart() { cart = {}; updateCartUI(); }

    window.onload = loadData;
</script>
</body>
</html>
